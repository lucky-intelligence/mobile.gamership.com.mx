name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    # Lets the built-in GITHUB_TOKEN read the private @lucky-intelligence/* packages
    # (this repo must be granted access in each package's "Manage Actions access").
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
  
      # .npmrc is gitignored, so it isn't in the checkout — recreate it for the
      # Docker build context (no secret in it; the token is injected at build time).
      - name: Write .npmrc for GitHub Packages
        run: printf '@lucky-intelligence:registry=https://npm.pkg.github.com\n//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}\n' > .npmrc

      - name: Build the Docker image
        run: npm run deploy
        env:
          # deploy.mjs forwards this into the Docker build as the
          # node_auth_token secret, which .npmrc uses to install from GitHub Packages.
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN || github.token }}